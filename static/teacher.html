<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <div class="logo">EduAI</div>

    <div class="nav-links">
        <a href="/static/teacher.html" class="active">Dashboard</a>
        <a href="#upload-paper">Upload Paper</a>
        <a href="#upload-scheme">Upload Scheme</a>
        <a href="#view-papers">View Papers</a>
    </div>

    <div class="profile">👩‍🏫 Teacher</div>
</div>

<!-- ================= MAIN CONTAINER ================= -->
<div class="container">

<!-- Upload Paper -->
<div class="section" id="upload-paper">
    <h3>Upload Question Paper</h3>

    <input type="text" id="subject" placeholder="Subject Name">
    <input type="text" id="examTitle" placeholder="Exam Title">
    <input type="number" id="totalMarks" placeholder="Total Marks">
    <input type="file" id="questionFile">

    <button onclick="uploadPaper()">Upload Paper</button>
    <div id="paperMessage" class="message"></div>
</div>

<!-- Upload Scheme -->
<div class="section" id="upload-scheme">
    <h3>Upload Answer Scheme</h3>

    <div class="info-box">
        Ensure format: <strong>Q1: Answer</strong>
    </div>

    <input type="number" id="paperId" placeholder="Paper ID">
    <input type="file" id="schemeFile" accept=".txt">

    <button onclick="uploadScheme()">Upload Scheme</button>
    <div id="schemeMessage" class="message"></div>
</div>

<!-- View Papers -->
<div class="section" id="view-papers">
    <h3>Question Papers</h3>

    <button onclick="loadPapers()">Refresh List</button>

    <table id="papersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Subject</th>
                <th>Exam</th>
                <th>Total</th>
                <th>File</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="papersBody"></tbody>
    </table>
</div>

</div>

<script>

async function uploadPaper() {
    const subject = document.getElementById("subject").value;
    const examTitle = document.getElementById("examTitle").value;
    const totalMarks = document.getElementById("totalMarks").value;
    const file = document.getElementById("questionFile").files[0];

    let formData = new FormData();
    formData.append("subject_name", subject);
    formData.append("exam_title", examTitle);
    formData.append("total_marks", totalMarks);
    formData.append("file", file);

    const response = await fetch("/teacher/upload-paper", {
        method: "POST",
        body: formData
    });

    const data = await response.json();
    document.getElementById("paperMessage").innerText = data.message;
}

async function uploadScheme() {
    const paperId = document.getElementById("paperId").value;
    const file = document.getElementById("schemeFile").files[0];

    if (!file.name.endsWith(".txt")) {
        alert("Answer scheme must be a .txt file");
        return;
    }

    let formData = new FormData();
    formData.append("paper_id", paperId);
    formData.append("file", file);

    const response = await fetch("/teacher/upload-scheme", {
        method: "POST",
        body: formData
    });

    const data = await response.json();
    document.getElementById("schemeMessage").innerText = data.message;
}

async function loadPapers() {
    const response = await fetch("/teacher/papers");
    const papers = await response.json();

    const body = document.getElementById("papersBody");
    body.innerHTML = "";

    papers.forEach(paper => {
        body.innerHTML += `
        <tr>
            <td>${paper[0]}</td>
            <td>${paper[1]}</td>
            <td>${paper[2]}</td>
            <td>${paper[3]}</td>
            <td>${paper[4]}</td>
            <td>
                <button class="danger-btn" onclick="deletePaper(${paper[0]})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });
}

async function deletePaper(paperId) {
    if (!confirm("Are you sure you want to delete this paper?")) return;

    const response = await fetch(`/teacher/delete-paper/${paperId}`, {
        method: "DELETE"
    });

    const data = await response.json();
    alert(data.message);
    loadPapers();
}

// ================= TOAST FUNCTION =================
function showToast(message, type="success") {
    const container = document.getElementById("toast-container");

    const toast = document.createElement("div");
    toast.classList.add("toast", type);
    toast.innerText = message;

    container.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3500);
}

// ================= SUCCESS MODAL =================
function showSuccessModal(title, message) {
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalMessage").innerText = message;

    document.getElementById("successModal").classList.add("show");
}

function closeModal() {
    document.getElementById("successModal").classList.remove("show");
}

</script>
<!-- ================= TOAST CONTAINER ================= -->
<div id="toast-container"></div>

<!-- ================= SUCCESS MODAL ================= -->
<div id="successModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon">✔</div>
        <h3 id="modalTitle">Success!</h3>
        <p id="modalMessage">Action completed successfully.</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>
</body>
</html>
