<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <style>
        body { font-family: Arial; padding: 30px; background: #f4f6f9; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: green; color: white; border: none; }
    </style>
</head>
<body>

<h2>Student Portal</h2>

<div class="section">
    <select id="paperSelect"></select>
    <button onclick="loadPapers()">Load Papers</button>
    <button onclick="loadQuestions()">Start Exam</button>
</div>

<div class="section">
    <input type="number" id="studentId" placeholder="Student ID">
    <div id="questionsContainer"></div>

    <h4>OR Upload Full Answer Sheet (PDF or DOCX)</h4>
    <input type="file" id="answerFile" accept=".pdf,.docx">

    <br><br>
    <button onclick="submitPaper()">Submit Paper</button>
</div>

<div id="result"></div>

<script>

async function loadPapers() {
    const response = await fetch("/student/papers");
    const papers = await response.json();

    const select = document.getElementById("paperSelect");
    select.innerHTML = "";

    papers.forEach(paper => {
        select.innerHTML += `<option value="${paper[0]}">${paper[2]}</option>`;
    });
}

async function loadQuestions() {
    const paperId = document.getElementById("paperSelect").value;
    const response = await fetch(`/student/paper/${paperId}/questions`);
    const questions = await response.json();

    const container = document.getElementById("questionsContainer");
    container.innerHTML = "";

    questions.forEach(q => {
        container.innerHTML += `
            <h4>Q${q.question_number} (${q.marks} Marks)</h4>
            <textarea id="q${q.question_number}"></textarea>
        `;
    });
}

async function submitPaper() {

    const studentId = document.getElementById("studentId").value;
    const paperId = document.getElementById("paperSelect").value;
    const file = document.getElementById("answerFile").files[0];

    let formData = new FormData();
    formData.append("student_id", studentId);
    formData.append("paper_id", paperId);

    if (file) {
        formData.append("file", file);
    } else {
        let answers = {};
        document.querySelectorAll("textarea").forEach(area => {
            const qNo = area.id.replace("q", "");
            answers[qNo] = area.value;
        });
        formData.append("answers", JSON.stringify(answers));
    }

    try {
        const response = await fetch("/student/submit-paper", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        console.log("Server Response:", data);  // 🔎 DEBUG

        // If backend returned error
        if (data.error) {
            document.getElementById("result").innerHTML =
                `<p style="color:red;">${data.error}</p>`;
            return;
        }

        // If details missing
        if (!data.details) {
            document.getElementById("result").innerHTML =
                `<p style="color:red;">Unexpected response from server.</p>`;
            return;
        }

        let resultHTML = `<h3>Total: ${data.total_obtained} / ${data.total_marks}</h3>`;

        data.details.forEach(d => {
            resultHTML += `
                <p>Q${d.question} - ${d.marks_awarded}/${d.max_marks}
                (Similarity: ${d.similarity})</p>
            `;
        });

        document.getElementById("result").innerHTML = resultHTML;

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerHTML =
            `<p style="color:red;">Submission failed. Check console.</p>`;
    }
}
</script>

</body>
</html>
