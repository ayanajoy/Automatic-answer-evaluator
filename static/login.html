<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Institutional Login | EduAI</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">Edu<span>AI</span></div>

      <h2 style="color: var(--text-header); font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; font-family: 'Merriweather', serif; letter-spacing: -0.5px;">
        Welcome back
      </h2>

      <p style="margin-bottom: 40px; font-size: 1rem; color: var(--text-body);">
        Enter your institutional details to continue.
      </p>

      <div class="form-group">
        <label>Academic Role</label>
        <select id="role">
          <option value="student">Student Account</option>
          <option value="teacher">Faculty / Staff Account</option>
        </select>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="name@university.edu"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button class="primary-btn" onclick="handleLogin()">
        Sign In to Portal
      </button>

      <div class="auth-footer">
        <p style="font-size: 0.9rem">
          New to EduAI?
          <a href="register.html" class="auth-link">Create an account</a>
        </p>
      </div>
    </div>

    <script>
      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (email === "" || password === "") {
          alert("Please enter email and password");
          return;
        }

        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: email,
              password: password,
            }),
          });

          const data = await response.json();

          if (data.status === "success") {
            localStorage.setItem("user", JSON.stringify(data.user));
            localStorage.setItem("access_token", data.access_token);

            if (data.user.role === "teacher") {
              window.location.href = "/static/teacher.html";
            } else {
              window.location.href = "/static/student.html";
            }
          } else {
            const errorMsg = data.detail || data.message || "Account not found.";
            alert("⚠️ Login Failed:\n" + errorMsg);
          }
        } catch (error) {
          alert("Server error. Please try again later.");
        }
      }
    </script>
  </body>
</html>
