<!DOCTYPE html>
<html>
<head>
    <title>Register | EduAI Portal</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body class="auth-wrapper">
    <div class="auth-card">
        <div class="logo" style="margin-bottom: 20px; border-color: var(--primary); color: var(--primary);">EduAI</div>
        <h2>Create Account</h2>
        <p>Institutional Access Enrollment</p>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="teacher">Teacher / Faculty</option>
            </select>
        </div>

        <div class="form-group">
            <label>University Email</label>
            <input type="email" id="email" placeholder="name@university.edu">
        </div>

        <div class="form-group">
            <label>Choose Password</label>
            <input type="password" placeholder="••••••••">
        </div>

        <button class="primary-btn" onclick="alert('Registration successful! Please login.')">Register Account</button>
        
        <p class="link-text">Already enrolled? <a href="login.html">Sign In</a></p>
    </div>
</body>
</html>
